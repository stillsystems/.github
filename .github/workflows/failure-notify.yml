name: 🚨 Failure Notification
on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
      workflow_name:
        required: true
        type: string
      run_id:
        required: true
        type: string
      error_message:
        required: false
        type: string
        default: "Automated CI/CD failure detected."

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Create Incident Issue
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { repository, workflow_name, run_id, error_message } = context.payload.inputs;
            const issueTitle = `🚨 Incident: ${workflow_name} failed in ${repository}`;
            const issueBody = `
            ### 🧱 Still Systems Incident Report
            
            **Repository**: ${repository}
            **Workflow**: ${workflow_name}
            **Run**: [View Logs](https://github.com/${repository}/actions/runs/${run_id})
            
            **Message**: ${error_message}
            
            ---
            *This issue was automatically generated by the global monitoring infrastructure.*
            `;
            
            await github.rest.issues.create({
              owner: 'stillsystems',
              repo: 'ops-center',
              title: issueTitle,
              body: issueBody,
              labels: ['incident', 'ci-failure']
            });
