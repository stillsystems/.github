name: Reusable Python CI

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: '3.12'
      working-directory:
        required: false
        type: string
        default: '.'

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: 'pip'
      - name: Install Dependencies
        working-directory: ${{ inputs.working-directory }}
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pip-audit
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install .; fi
      - name: Lint with ruff
        working-directory: ${{ inputs.working-directory }}
        run: ruff check .
      - name: Test with pytest
        working-directory: ${{ inputs.working-directory }}
        run: pytest
      - name: Audit dependencies
        working-directory: ${{ inputs.working-directory }}
        run: pip-audit

  notify-failure:
    name: Notify Failure
    needs: [lint-and-test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report Incident
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const issueTitle = `🚨 Incident: Python CI failed in ${context.repo.owner}/${context.repo.repo}`;
            const issueBody = `
            ### 🧱 Still Systems Incident Report
            
            **Repository**: ${context.repo.owner}/${context.repo.repo}
            **Workflow**: ${context.workflow}
            **Run**: [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            ---
            *This issue was automatically generated by the global monitoring infrastructure.*
            `;
            
            await github.rest.issues.create({
              owner: 'stillsystems',
              repo: 'ops-center',
              title: issueTitle,
              body: issueBody,
              labels: ['incident', 'ci-failure']
            });
