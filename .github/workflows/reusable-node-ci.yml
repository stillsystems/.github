name: Reusable Node CI

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: '24.x'
      working-directory:
        required: false
        type: string
        default: '.'
      run-xvfb:
        required: false
        type: boolean
        default: false

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json
      - name: Install Dependencies
        working-directory: ${{ inputs.working-directory }}
        run: npm ci
      - name: Lint
        working-directory: ${{ inputs.working-directory }}
        run: npm run lint --if-present
      - name: Test (with Xvfb)
        if: ${{ inputs.run-xvfb }}
        working-directory: ${{ inputs.working-directory }}
        run: xvfb-run -a npm run test --if-present
      - name: Test (without Xvfb)
        if: ${{ !inputs.run-xvfb }}
        working-directory: ${{ inputs.working-directory }}
        run: npm run test --if-present
      - name: Audit
        working-directory: ${{ inputs.working-directory }}
        run: npm audit --audit-level=high

  notify-failure:
    name: Notify Failure
    needs: [build-and-test]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Report Incident
        uses: actions/github-script@v9
        continue-on-error: true
        with:
          script: |
            const issueTitle = `🚨 Incident: Node CI failed in ${context.repo.owner}/${context.repo.repo}`;
            const issueBody = `
            ### 🧱 Still Systems Incident Report
            
            **Repository**: ${context.repo.owner}/${context.repo.repo}
            **Workflow**: ${context.workflow}
            **Run**: [View Logs](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            
            ---
            *This issue was automatically generated by the global monitoring infrastructure.*
            `;
            
            await github.rest.issues.create({
              owner: 'stillsystems',
              repo: 'ops-center',
              title: issueTitle,
              body: issueBody,
              labels: ['incident', 'ci-failure']
            });
